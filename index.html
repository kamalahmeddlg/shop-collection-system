<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Money Collection System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .title {
      text-align: center;
      margin-bottom: 25px;
    }

    .title h1 {
      font-size: 32px;
      color: #1e3a8a;
    }

    .title p {
      color: #555;
      margin-top: 8px;
    }

    .top-boxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 16px;
      color: #555;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 26px;
      font-weight: bold;
      color: #111;
    }

    .form-section, .table-section {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }

    .form-section h2,
    .table-section h2 {
      margin-bottom: 18px;
      color: #1e3a8a;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 15px;
    }

    input:focus, select:focus {
      border-color: #2563eb;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th, table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
    }

    table th {
      background: #eff6ff;
      color: #1e3a8a;
    }

    .delete-btn {
      background: #dc2626;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      border: none;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    @media (max-width: 600px) {
      .title h1 {
        font-size: 24px;
      }

      .card p {
        font-size: 22px;
      }

      table th, table td {
        font-size: 12px;
        padding: 10px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>Shop Money Collection System</h1>
      <p>Simple collection manager using HTML, CSS and JavaScript</p>
    </div>

    <div class="top-boxes">
      <div class="card">
        <h3>Total Collection</h3>
        <p id="totalCollection">₹0</p>
      </div>
      <div class="card">
        <h3>Total Entries</h3>
        <p id="totalEntries">0</p>
      </div>
      <div class="card">
        <h3>Today Date</h3>
        <p id="todayDate"></p>
      </div>
    </div>

    <div class="form-section">
      <h2>Add Collection</h2>
      <div class="form-grid">
        <input type="text" id="customerName" placeholder="Customer Name" />
        <input type="number" id="amount" placeholder="Amount" />
        <select id="paymentMethod">
          <option value="">Select Payment Method</option>
          <option value="Cash">Cash</option>
          <option value="UPI">UPI</option>
          <option value="Bank Transfer">Bank Transfer</option>
        </select>
        <input type="text" id="note" placeholder="Note (optional)" />
        <button onclick="addCollection()">Add Collection</button>
      </div>
    </div>

    <div class="table-section">
      <h2>Collection History</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Note</th>
            <th>Date & Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="collectionTable">
          <tr>
            <td colspan="7" class="empty">No collection added yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let collections = JSON.parse(localStorage.getItem("collections")) || [];

    function formatCurrency(amount) {
      return "₹" + amount.toLocaleString("en-IN");
    }

    function updateDashboard() {
      const total = collections.reduce((sum, item) => sum + item.amount, 0);
      document.getElementById("totalCollection").textContent = formatCurrency(total);
      document.getElementById("totalEntries").textContent = collections.length;
    }

    function renderTable() {
      const table = document.getElementById("collectionTable");

      if (collections.length === 0) {
        table.innerHTML = `<tr><td colspan="7" class="empty">No collection added yet</td></tr>`;
        updateDashboard();
        return;
      }

      table.innerHTML = collections.map((item, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${item.customerName}</td>
          <td>${formatCurrency(item.amount)}</td>
          <td>${item.paymentMethod}</td>
          <td>${item.note || "-"}</td>
          <td>${item.date}</td>
          <td><button class="delete-btn" onclick="deleteCollection(${index})">Delete</button></td>
        </tr>
      `).join("");

      updateDashboard();
    }

    function addCollection() {
      const customerName = document.getElementById("customerName").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      const paymentMethod = document.getElementById("paymentMethod").value;
      const note = document.getElementById("note").value.trim();

      if (!customerName || !amount || !paymentMethod) {
        alert("Please fill all required fields.");
        return;
      }

      const newCollection = {
        customerName,
        amount,
        paymentMethod,
        note,
        date: new Date().toLocaleString()
      };

      collections.push(newCollection);
      localStorage.setItem("collections", JSON.stringify(collections));

      document.getElementById("customerName").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("paymentMethod").value = "";
      document.getElementById("note").value = "";

      renderTable();
    }

    function deleteCollection(index) {
      if (confirm("Are you sure you want to delete this entry?")) {
        collections.splice(index, 1);
        localStorage.setItem("collections", JSON.stringify(collections));
        renderTable();
      }
    }

    function showTodayDate() {
      const today = new Date();
      document.getElementById("todayDate").textContent = today.toLocaleDateString("en-IN");
    }

    showTodayDate();
    renderTable();
  </script>
</body>
</html>
